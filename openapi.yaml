            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================================================
  # Pen Pal System Endpoints
  # ============================================================================

  /api/penpals/{userId}:
    get:
      summary: List all pen pals
      description: Returns all pen pals with unlock status for the user
      operationId: getUserPenPals
      tags:
        - PenPals
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: User identifier
      responses:
        '200':
          description: Pen pals retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  pen_pals:
                    type: array
                    items:
                      allOf:
                        - $ref: '#/components/schemas/PenPal'
                        - $ref: '#/components/schemas/UserPenPal'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/penpals/{penPalId}/details:
    get:
      summary: Get pen pal profile
      description: Returns detailed profile information for a pen pal
      operationId: getPenPalDetails
      tags:
        - PenPals
      parameters:
        - name: penPalId
          in: path
          required: true
          schema:
            type: string
          description: Pen pal identifier
      responses:
        '200':
          description: Pen pal profile retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PenPal'
        '404':
          description: Pen pal not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/penpals/{penPalId}/letters/{userId}:
    get:
      summary: Get conversation thread
      description: Returns all letters exchanged between user and pen pal (paginated)
      operationId: getPenPalLetters
      tags:
        - PenPals
      parameters:
        - name: penPalId
          in: path
          required: true
          schema:
            type: string
          description: Pen pal identifier
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: User identifier
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Items per page
      responses:
        '200':
          description: Letter thread retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  letters:
                    type: array
                    items:
                      $ref: '#/components/schemas/PenPalLetter'
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
                      has_next:
                        type: boolean
        '403':
          description: Pen pal not unlocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Pen pal or user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/penpals/{penPalId}/send-letter:
    post:
      summary: Send letter to pen pal
      description: |
        User sends a letter to a pen pal. Subject to constraints:
        - Pen pal must be unlocked
        - Content must be 10-1000 characters
        - Max 3 letters per week across all pen pals (R30)
        - No letters if user inactive 7+ days
      operationId: sendPenPalLetter
      tags:
        - PenPals
      parameters:
        - name: penPalId
          in: path
          required: true
          schema:
            type: string
          description: Pen pal identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendLetterRequest'
      responses:
        '201':
          description: Letter sent successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PenPalLetter'
        '400':
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Pen pal not unlocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Business logic violation (e.g., user inactive 7+ days)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Max 3 letters per week exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: WEEKLY_LETTER_LIMIT
                message: You can only send 3 pen pal letters per week
                details:
                  letters_sent_this_week: 3
                  limit: 3
                  resets_at: '2026-05-04T00:00:00Z'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/penpals/{penPalId}/read-letter/{letterId}:
    post:
      summary: Mark letter as read
      description: Marks a pen pal letter as read by the user
      operationId: markLetterAsRead
      tags:
        - PenPals
      parameters:
        - name: penPalId
          in: path
          required: true
          schema:
            type: string
          description: Pen pal identifier
        - name: letterId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Letter identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
              properties:
                user_id:
                  type: string
      responses:
        '200':
          description: Letter marked as read
          content:
            application/json:
              schema:
                type: object
                properties:
                  letter_id:
                    type: string
                    format: uuid
                  read_at:
                    type: string
                    format: date-time
        '404':
          description: Letter not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Letter already read
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/penpals/{penPalId}/relationship/{userId}:
    get:
      summary: Get relationship status
      description: |
        Returns relationship status including attention score calculation:
        Formula: (letters_sent * 3) + (letters_read * 1) + (recommendations_engaged * 2) - (days_since_last * 0.5)

        Temperature thresholds:
        - hot: attention_score >= 30 (weekly letters)
        - warm: 15-29 (bi-weekly letters)
        - cool: 5-14 (monthly letters)
        - dormant: < 5 (no new letters)
      operationId: getPenPalRelationship
      tags:
        - PenPals
      parameters:
        - name: penPalId
          in: path
          required: true
          schema:
            type: string
          description: Pen pal identifier
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: User identifier
      responses:
        '200':
          description: Relationship status retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPenPal'
        '403':
          description: Pen pal not unlocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Pen pal or user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

