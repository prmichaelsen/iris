          schema:
            type: string
          description: User identifier
      responses:
        '200':
          description: Collection retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  pen_pal_id:
                    type: string
                  collectibles:
                    type: array
                    items:
                      allOf:
