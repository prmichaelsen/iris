        '404':
          description: Pen pal not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/collectibles/{collectibleId}/unlock:
    post:
      summary: Unlock collectible
      description: Unlocks a collectible from a letter gift (idempotent)
      operationId: unlockCollectible
      tags:
        - Collectibles
      parameters:
        - name: collectibleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Collectible identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
                - letter_id
              properties:
                user_id:
                  type: string
                letter_id:
                  type: string
                  format: uuid
      responses:
        '201':
          description: Collectible unlocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCollectible'
        '400':
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Collectible not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Already unlocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================================================
  # Photo Collection (Fotos) System Endpoints
  # ============================================================================

  /api/fotos/{userId}:
    get:
      summary: Get all unlocked Fotos
      description: Returns user's unlocked photos (filterable by region/category)
      operationId: getUserFotos
      tags:
        - Fotos
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: User identifier
        - name: region
          in: query
          required: false
          schema:
            type: string
          description: Filter by region
        - name: category
          in: query
          required: false
          schema:
            type: string
            enum: [menschen, orte, kultur, essen]
          description: Filter by category
      responses:
        '200':
          description: Fotos retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  fotos:
                    type: array
                    items:
                      allOf:
                        - $ref: '#/components/schemas/Foto'
                        - $ref: '#/components/schemas/UserFoto'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/fotos/{fotoId}/unlock:
    post:
      summary: Unlock Foto
      description: |
        Unlocks a Foto (from subquest completion). Validates:
        - Subquest must be completed
        - Tier requirement must be met (R9)
        - No duplicate unlocks (idempotent)

        Note: Fotos are pre-generated and cached in R2. No image generation API call.
      operationId: unlockFoto
      tags:
        - Fotos
      parameters:
        - name: fotoId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Foto identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
              properties:
                user_id:
                  type: string
      responses:
        '201':
          description: Foto unlocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserFoto'
        '400':
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Tier requirement not met
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: TIER_REQUIREMENT_NOT_MET
                message: Requires Silver in Grammar + Listening
                details:
                  tier_required: 3
                  current_badges:
                    grammar: bronze
                    listening: grey
        '404':
          description: Foto not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Already unlocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Subquest not completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

