    get:
      summary: Gallery view for one region
      description: Returns all Fotos for a region (both locked and unlocked)
      operationId: getRegionGallery
      tags:
        - Fotos
      parameters:
        - name: regionId
          in: path
          required: true
          schema:
            type: string
          description: Region identifier
        - name: userId
          in: query
          required: true
          schema:
            type: string
          description: User identifier
      responses:
        '200':
          description: Gallery retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  region_id:
                    type: string
                  fotos:
                    type: array
                    items:
                      allOf:
                        - $ref: '#/components/schemas/Foto'
                        - type: object
                          properties:
                            unlocked:
                              type: boolean
                              description: Whether user has unlocked this Foto
        '404':
          description: Region not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================================================
  # Emma's Fairy Tale Mini-Game Endpoints
  # ============================================================================

  /api/fairytales/start:
    post:
      summary: Start new fairy tale
      description: Creates a new fairy tale co-writing session with Emma
      operationId: startFairyTale
      tags:
        - FairyTales
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartFairyTaleRequest'
      responses:
        '201':
          description: Fairy tale started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserFairyTale'
        '400':
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/fairytales/{fairyTaleId}/turn:
    post:
      summary: Add turn to story
      description: |
        Adds a turn to the fairy tale (user or Emma). Must alternate authors.
        Claude API grades user turns on grammar/vocabulary/creativity and detects
        trigger words (clocks, fairy tale tropes, precise descriptions).
      operationId: addFairyTaleTurn
      tags:
        - FairyTales
      parameters:
        - name: fairyTaleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Fairy tale identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddFairyTaleTurnRequest'
      responses:
        '201':
          description: Turn added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FairyTaleTurn'
        '400':
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Fairy tale not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Must alternate authors
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/fairytales/{userId}/archive:
    get:
      summary: Get Märchenbuch archive
      description: Returns all completed fairy tales for user (paginated)
      operationId: getFairyTaleArchive
      tags:
        - FairyTales
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: User identifier
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 50
          description: Items per page
      responses:
        '200':
          description: Archive retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  fairy_tales:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserFairyTale'
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
                      has_next:
                        type: boolean
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/fairytales/{fairyTaleId}:
    get:
      summary: Get full fairy tale
      description: Returns complete fairy tale with all turns and reactions
      operationId: getFairyTale
      tags:
        - FairyTales
      parameters:
        - name: fairyTaleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Fairy tale identifier
      responses:
        '200':
          description: Fairy tale retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/UserFairyTale'
                  - type: object
                    properties:
                      turns:
                        type: array
                        items:
                          $ref: '#/components/schemas/FairyTaleTurn'
        '404':
          description: Fairy tale not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

