openapi: 3.0.3
info:
  title: Iris Gamification API
  description: |
    API for Iris language learning gamification system.
    Covers progress tracking, quests, badges, points, map progression,
    character relationships, pen pals, and photo collections.
  version: 0.10.0
  contact:
    name: Iris Development Team

servers:
  - url: http://localhost:8787
    description: Local development
  - url: https://iris.prmichaelsen.workers.dev
    description: Production (Cloudflare Workers)

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: User authentication token

  schemas:
    # ============================================================================
    # Core Progress & Quests (Task 1)
    # ============================================================================

    UserProgress:
      type: object
      required:
        - user_id
        - level
        - xp_current
        - xp_to_next_level
        - created_at
        - updated_at
      properties:
        user_id:
          type: string
          description: User identifier
        level:
          type: integer
          minimum: 1
          description: Current user level
        xp_current:
          type: integer
          minimum: 0
          description: XP earned in current level
        xp_to_next_level:
          type: integer
          minimum: 1
          description: XP required to reach next level
        created_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp
        updated_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp

    Quest:
      type: object
      required:
        - id
        - name_de
        - name_en
        - description_de
        - description_en
        - category
        - points_reward
        - is_repeatable
        - is_hidden
      properties:
        id:
          type: string
          format: uuid
          description: Quest identifier
        name_de:
          type: string
          description: Quest name in German
        name_en:
          type: string
          description: Quest name in English
        description_de:
          type: string
          description: Quest description in German
        description_en:
          type: string
          description: Quest description in English
        category:
          type: string
          enum: [skill, achievement, streak, hidden, lesson, cultural, meta]
          description: Quest category
        badge_skill:
          type: string
          nullable: true
          description: Associated skill badge (e.g., 'flashcard', 'dictation')
        tier_thresholds:
          type: array
          items:
            type: integer
          description: Thresholds for badge tiers (e.g., [10, 50, 100, 500, 1000])
        points_reward:
          type: integer
          minimum: 0
          description: Points awarded on completion
        is_repeatable:
          type: boolean
          description: Whether quest can be completed multiple times
        is_hidden:
          type: boolean
          description: Whether quest is hidden until unlocked

    UserQuest:
      type: object
      required:
        - id
        - user_id
        - quest_id
        - progress
        - completed
      properties:
        id:
          type: string
          format: uuid
          description: User quest instance identifier
        user_id:
          type: string
          description: User identifier
        quest_id:
          type: string
          format: uuid
          description: Quest identifier
        progress:
          type: integer
          minimum: 0
          description: Current progress count
        completed:
          type: boolean
          description: Whether quest is completed
        completed_at:
          type: string
          format: date-time
          nullable: true
          description: ISO 8601 timestamp of completion
        tier_unlocked:
          type: string
          enum: [grey, bronze, silver, gold, diamond, platinum]
          nullable: true
          description: Badge tier unlocked (if skill quest)

    UserBadge:
      type: object
      required:
        - user_id
        - skill
        - tier
        - progress
        - unlocked_at
      properties:
        user_id:
          type: string
          description: User identifier
        skill:
          type: string
          description: Skill type (flashcard, dictation, grammar, etc.)
        tier:
          type: string
          enum: [grey, bronze, silver, gold, diamond, platinum]
          description: Badge tier
        progress:
          type: integer
          minimum: 0
          description: Count toward next tier
        unlocked_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp

    BadgeMetadata:
      type: object
      required:
        - skill
        - tier
        - threshold
        - name_de
        - name_en
        - description_de
        - description_en
      properties:
        skill:
          type: string
          description: Skill type
        tier:
          type: string
          enum: [grey, bronze, silver, gold, diamond, platinum]
          description: Badge tier
        threshold:
          type: integer
          minimum: 0
          description: Count required to unlock this tier
        name_de:
          type: string
          description: Badge name in German
        name_en:
          type: string
          description: Badge name in English
        description_de:
          type: string
          description: Badge description in German
        description_en:
          type: string
          description: Badge description in English

    XPAwardRequest:
      type: object
      required:
        - user_id
        - amount
        - source
      properties:
        user_id:
          type: string
          description: User identifier
        amount:
          type: integer
          minimum: 10
          maximum: 50
          description: XP amount to award (10-50)
        source:
          type: string
          enum: [drill_complete, quest_complete, bonus]
          description: Source of XP

    XPAwardResponse:
      type: object
      required:
        - user_id
        - xp_awarded
        - xp_current
        - level
        - level_up
      properties:
        user_id:
          type: string
        xp_awarded:
          type: integer
        xp_current:
          type: integer
        level:
          type: integer
        level_up:
          type: boolean
          description: Whether user leveled up
        xp_to_next_level:
          type: integer
          description: XP needed for next level (if level_up occurred)

    QuestProgressRequest:
      type: object
      required:
        - user_id
        - increment
      properties:
        user_id:
          type: string
        increment:
          type: integer
          minimum: 1
          maximum: 100
          description: Progress increment (1-100)

    QuestCompleteResponse:
      type: object
      required:
        - quest_id
        - user_id
        - completed
        - points_awarded
      properties:
        quest_id:
          type: string
          format: uuid
        user_id:
          type: string
        completed:
          type: boolean
        points_awarded:
          type: integer
        tier_unlocked:
          type: string
          enum: [grey, bronze, silver, gold, diamond, platinum]
          nullable: true
          description: Badge tier unlocked (if applicable)

    BadgeProgressRequest:
      type: object
      required:
        - user_id
        - count
      properties:
        user_id:
          type: string
        count:
          type: integer
          minimum: 1
          description: Number of completions to add

    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Error code (e.g., 'INVALID_PARAMETER', 'QUEST_NOT_FOUND')
        message:
          type: string
          description: Human-readable error message
        details:
          type: object
          additionalProperties: true
          description: Additional error context

    # ============================================================================
    # Pen Pal System (Task 3)
    # ============================================================================

    PenPal:
      type: object
      required:
        - id
        - name
        - age
        - profession_de
        - profession_en
        - region_id
        - personality_traits
        - collectible_type
        - unlock_quest_id
      properties:
        id:
          type: string
          description: Pen pal identifier (e.g., 'mila', 'thomas', 'lena')
        name:
          type: string
          description: Pen pal name
        age:
          type: integer
          description: Pen pal age
        profession_de:
          type: string
          description: Profession in German
        profession_en:
          type: string
          description: Profession in English
        region_id:
          type: string
          description: Associated region
        personality_traits:
          type: array
          items:
            type: string
          description: Personality traits (e.g., 'music_lover', 'foodie')
        collectible_type:
          type: string
          description: Type of collectibles they send (stickers, vinyl, wine_labels, etc.)
        unlock_quest_id:
          type: string
          description: Tier 2 regional quest required to unlock

    UserPenPal:
      type: object
      required:
        - user_id
        - pen_pal_id
        - unlocked
        - relationship_score
        - letters_sent_by_user
        - letters_received
        - attention_score
        - temperature
      properties:
        user_id:
          type: string
          description: User identifier
        pen_pal_id:
          type: string
          description: Pen pal identifier
        unlocked:
          type: boolean
          description: Whether pen pal is unlocked
        relationship_score:
          type: integer
          minimum: 0
          maximum: 100
          description: Relationship score (0-100)
        letters_sent_by_user:
          type: integer
          minimum: 0
          description: Count of letters sent by user
        letters_received:
          type: integer
          minimum: 0
          description: Count of letters received from pen pal
        last_interaction_at:
          type: string
          format: date-time
          nullable: true
          description: ISO 8601 timestamp of last interaction
        attention_score:
          type: number
          format: float
          description: |
            Calculated attention score: (letters_sent * 3) + (letters_read * 1)
            + (recommendations_engaged * 2) - (days_since_last * 0.5)
        temperature:
          type: string
          enum: [hot, warm, cool, dormant]
          description: |
            Relationship temperature based on attention score:
            - hot: attention_score >= 30 (weekly letters)
            - warm: 15-29 (bi-weekly letters)
            - cool: 5-14 (monthly letters)
            - dormant: < 5 (no new letters)
        unlocked_at:
          type: string
          format: date-time
          nullable: true
          description: ISO 8601 timestamp when unlocked

    PenPalLetter:
      type: object
      required:
        - id
        - pen_pal_id
        - user_id
        - sender
        - sent_at
      properties:
        id:
          type: string
          format: uuid
          description: Letter identifier
        pen_pal_id:
          type: string
          description: Pen pal identifier
        user_id:
          type: string
          description: User identifier
        sender:
          type: string
          enum: [pen_pal, user]
          description: Who sent the letter
        content_de:
          type: string
          description: Letter content in German
        content_en:
          type: string
          nullable: true
          description: Letter translation (null for user letters)
        collectible_gift_id:
          type: string
          nullable: true
          description: Attached collectible gift (from pen pal letters only)
        sent_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp
        read_at:
          type: string
          format: date-time
          nullable: true
          description: ISO 8601 timestamp when read

    SendLetterRequest:
      type: object
      required:
        - user_id
        - content_de
      properties:
        user_id:
          type: string
          description: User identifier
        content_de:
          type: string
          minLength: 10
          maxLength: 1000
          description: Letter content in German (10-1000 characters)

    # ============================================================================
    # Collectibles System (Task 3)
    # ============================================================================

    Collectible:
      type: object
      required:
        - id
        - pen_pal_id
        - type
        - name_de
        - name_en
        - description_de
        - description_en
        - image_url
      properties:
        id:
          type: string
          format: uuid
          description: Collectible identifier
        pen_pal_id:
          type: string
          description: Associated pen pal
        type:
          type: string
          description: Collectible type (sticker, vinyl, wine_label, flower, etc.)
        name_de:
          type: string
          description: Name in German
        name_en:
          type: string
          description: Name in English
        description_de:
          type: string
          description: Description in German
        description_en:
          type: string
          description: Description in English
        image_url:
          type: string
          format: uri
          description: R2 CDN URL for collectible image
        metadata:
          type: object
          additionalProperties: true
          description: |
            Type-specific metadata:
            - Vinyl: {artist, album, year, bandcamp_link, youtube_link}
            - Wine: {vineyard, year, varietal, tasting_notes}
            - Flower: {species, location, date_collected}
            - Sticker: {theme, artist, series}
        external_links:
          type: array
          items:
            type: string
            format: uri
          description: External links (YouTube, Bandcamp, etc.)

    UserCollectible:
      type: object
      required:
        - user_id
        - collectible_id
        - acquired_at
      properties:
        user_id:
          type: string
          description: User identifier
        collectible_id:
          type: string
          format: uuid
          description: Collectible identifier
        acquired_from_letter_id:
          type: string
          format: uuid
          nullable: true
          description: Letter that contained this gift
        acquired_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp

    # ============================================================================
    # Photo Collection (Fotos) System (Task 3)
    # ============================================================================

    Foto:
      type: object
      required:
        - id
        - region_id
        - category
        - title_de
        - title_en
        - caption_de
        - caption_en
        - image_url
        - subquest_id
        - tier_required
      properties:
        id:
          type: string
          format: uuid
          description: Foto identifier
        region_id:
          type: string
          description: Associated region
        category:
          type: string
          enum: [menschen, orte, kultur, essen]
          description: Photo category
        title_de:
          type: string
          description: Title in German
        title_en:
          type: string
          description: Title in English
        caption_de:
          type: string
          description: Caption in German
        caption_en:
          type: string
          description: Caption in English
        image_url:
          type: string
          format: uri
          description: R2 CDN URL for photo (pre-generated, no generation API call)
        subquest_id:
          type: string
          description: Subquest that unlocks this photo
        tier_required:
          type: integer
          minimum: 1
          maximum: 4
          description: Tier requirement (1=Bronze, 2=Silver, 3=Gold, 4=Diamond)

    UserFoto:
      type: object
      required:
        - user_id
        - foto_id
        - unlocked_at
      properties:
        user_id:
          type: string
          description: User identifier
        foto_id:
          type: string
          format: uuid
          description: Foto identifier
        unlocked_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp

    # ============================================================================
    # Emma's Fairy Tale Mini-Game (Task 3)
    # ============================================================================

    UserFairyTale:
      type: object
      required:
        - id
        - user_id
        - title
        - content
        - turn_count
        - user_level_at_creation
        - grammar_errors_count
        - vocabulary_richness_score
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Fairy tale identifier
        user_id:
          type: string
          description: User identifier
        title:
          type: string
          description: Story title
        content:
          type: string
          description: Full story with turn markers
        turn_count:
          type: integer
          minimum: 1
          description: Number of turns in story
        user_level_at_creation:
          type: integer
          minimum: 1
          description: User's level when story was created (for progress tracking)
        grammar_errors_count:
          type: integer
          minimum: 0
          description: Total grammar errors in user's turns
        vocabulary_richness_score:
          type: number
          format: float
          minimum: 0
          maximum: 100
          description: Vocabulary richness score (0-100)
        created_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp
        emma_reactions:
          type: array
          items:
            type: string
          description: Emma's special reactions during the story

    FairyTaleTurn:
      type: object
      required:
        - fairy_tale_id
        - turn_number
        - author
        - content
      properties:
        fairy_tale_id:
          type: string
          format: uuid
          description: Associated fairy tale
        turn_number:
          type: integer
          minimum: 1
          description: Turn sequence number
        author:
          type: string
          enum: [user, emma]
          description: Who wrote this turn
        content:
          type: string
          description: Turn content in German
        grammar_score:
          type: number
          format: float
          nullable: true
          description: Grammar score (null for Emma's turns)
        vocabulary_score:
          type: number
          format: float
          nullable: true
          description: Vocabulary score (null for Emma's turns)
        creativity_score:
          type: number
          format: float
          nullable: true
          description: Creativity score (null for Emma's turns)
        emma_reaction:
          type: string
          nullable: true
          description: Emma's reaction to this turn (if triggered)

    StartFairyTaleRequest:
      type: object
      required:
        - user_id
      properties:
        user_id:
          type: string
          description: User identifier

    AddFairyTaleTurnRequest:
      type: object
      required:
        - author
        - content
      properties:
        author:
          type: string
          enum: [user, emma]
          description: Turn author
        content:
          type: string
          minLength: 10
          maxLength: 500
          description: Turn content in German

paths:
  # ============================================================================
  # Progress Tracking Endpoints
  # ============================================================================

  /api/progress/{userId}:
    get:
      summary: Get user progress
      description: Returns user's current level, XP, and progress summary
      operationId: getUserProgress
      tags:
        - Progress
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: User identifier
      responses:
        '200':
          description: User progress retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProgress'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/progress/xp:
    post:
      summary: Award XP
      description: Awards XP to user, handles level-up if threshold crossed
      operationId: awardXP
      tags:
        - Progress
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/XPAwardRequest'
      responses:
        '200':
          description: XP awarded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/XPAwardResponse'
        '400':
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/progress/mastery/{userId}:
    get:
      summary: Get mastery breakdown
      description: Returns user's mastery scores by skill category
      operationId: getUserMastery
      tags:
        - Progress
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: User identifier
      responses:
        '200':
          description: Mastery breakdown retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: string
                  mastery:
                    type: object
                    additionalProperties:
                      type: number
                      format: float
                      minimum: 0
                      maximum: 100
                    description: Map of skill → mastery percentage
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================================================
  # Quest System Endpoints
  # ============================================================================

  /api/quests/available/{userId}:
    get:
      summary: List available quests
      description: Returns quests available to user (filtered by level/region)
      operationId: getAvailableQuests
      tags:
        - Quests
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: region
          in: query
          required: false
          schema:
            type: string
          description: Filter by region (e.g., 'berlin', 'bavaria')
        - name: category
          in: query
          required: false
          schema:
            type: string
            enum: [skill, achievement, streak, hidden, lesson, cultural, meta]
          description: Filter by quest category
      responses:
        '200':
          description: Available quests retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  quests:
                    type: array
                    items:
                      $ref: '#/components/schemas/Quest'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/quests/active/{userId}:
    get:
      summary: List active quests
      description: Returns user's in-progress quests
      operationId: getActiveQuests
      tags:
        - Quests
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Active quests retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  quests:
                    type: array
                    items:
                      allOf:
                        - $ref: '#/components/schemas/Quest'
                        - type: object
                          properties:
                            progress:
                              type: integer
                            target:
                              type: integer
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/quests/{questId}:
    get:
      summary: Get quest details
      description: Returns detailed information about a quest
      operationId: getQuest
      tags:
        - Quests
      parameters:
        - name: questId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Quest details retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Quest'
        '404':
          description: Quest not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/quests/{questId}/progress:
    post:
      summary: Increment quest progress
      description: Adds progress to a user's quest
      operationId: incrementQuestProgress
      tags:
        - Quests
      parameters:
        - name: questId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuestProgressRequest'
      responses:
        '200':
          description: Progress updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  quest_id:
                    type: string
                    format: uuid
                  user_id:
                    type: string
                  progress:
                    type: integer
                  completed:
                    type: boolean
        '400':
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Quest or user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Quest not active for user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/quests/{questId}/complete:
    post:
      summary: Complete quest
      description: Marks quest as complete, awards points, checks badge tier unlock
      operationId: completeQuest
      tags:
        - Quests
      parameters:
        - name: questId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
              properties:
                user_id:
                  type: string
      responses:
        '200':
          description: Quest completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestCompleteResponse'
        '400':
          description: Invalid parameters
          content:
            application/json:
              schema:
