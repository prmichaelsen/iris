      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Badges retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  badges:
                    type: array
                    items:
                      allOf:
                        - $ref: '#/components/schemas/UserBadge'
                        - type: object
                          properties:
                            threshold_next:
                              type: integer
                              description: Count required for next tier
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/badges/{skill}/progress:
    post:
      summary: Increment badge progress
